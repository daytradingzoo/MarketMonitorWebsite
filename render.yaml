version: "1"

services:
  - type: web
    name: market-monitor-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-monitor-db
          property: connectionString
      - key: POLYGON_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: market-monitor-frontend
    runtime: node
    plan: starter
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: PORT
        value: "3000"

  - type: cron
    name: market-monitor-pipeline
    runtime: python
    plan: starter
    region: oregon
    rootDir: jobs
    buildCommand: pip install -r requirements.txt
    schedule: "30 21 * * 1-5"
    command: python -m run_pipeline
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-monitor-db
          property: connectionString
      - key: POLYGON_API_KEY
        sync: false

databases:
  - name: market-monitor-db
    plan: starter
    region: oregon
    databaseName: marketmonitor
    user: marketmonitor
