version: "1"

services:
  # ── FastAPI backend ─────────────────────────────────────────────────────────
  - type: web
    name: market-monitor-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-monitor-db
          property: connectionString
      - key: POLYGON_API_KEY
        sync: false   # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false   # set to your Next.js domain: https://market-monitor.onrender.com
    healthCheckPath: /

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  - type: web
    name: market-monitor-frontend
    runtime: node
    plan: starter
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # set to: https://market-monitor-api.onrender.com
      - key: PORT
        value: "3000"

  # ── Daily pipeline cron job ───────────────────────────────────────────────────
  - type: cron
    name: market-monitor-pipeline
    runtime: python
    plan: starter
    region: oregon
    rootDir: jobs
    buildCommand: pip install -r requirements.txt
    schedule: "30 21 * * 1-5"   # 4:30 PM ET (21:30 UTC) Mon–Fri
    command: python -m run_pipeline
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-monitor-db
          property: connectionString
      - key: POLYGON_API_KEY
        sync: false

databases:
  - name: market-monitor-db
    plan: starter
    region: oregon
    databaseName: marketmonitor
    user: marketmonitor
